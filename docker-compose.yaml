services:
  database:
    image: postgres:15
    container_name: healthsync_db
    environment:
      POSTGRES_DB: healthsyncdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres4healthsync
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d healthsyncdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: src/HealthSync.Api/Dockerfile
    container_name: healthsync_api
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__Default=Host=database;Port=5432;Database=healthsyncdb;Username=admin;Password=postgres4healthsync
      - Jwt__Key=ThisIsASecureKeyForHealthSync2026Project!
      - Jwt_Issuer=HealthSync
      - Jwt__Audience=HealthSyncApp
      - ASPNETCORE_ENVIRONMENT=Development
      - HTTP_PORTS=5000
    volumes:
      - dataprotection:/root/.aspnet/DataProtection-Keys
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: oven/bun:1
    container_name: healthsync_frontend
    ports:
      - "3000:3000"
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "bun install && bun run dev -- --host"
    depends_on:
      - backend

volumes:
  pgdata:
  dataprotection:
